name: Orçamento Atividades

on:
  schedule:
    # Horário do GitHub Actions é UTC
    # 07:00 BRT -> 10:00 UTC
    # 12:00 BRT -> 15:00 UTC
    # 15:00 BRT -> 18:00 UTC
    # 18:00 BRT -> 21:00 UTC
    - cron: "0 10,15,18,21 * * *"
  workflow_dispatch:

jobs:
  orcamento-atividades:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Criar credenciais.json a partir do secret .b64
        env:
          GOOGLE_CREDENTIALS_B64: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          python - <<'PY'
          import os
          import re
          import base64

          b64 = os.environ["GOOGLE_CREDENTIALS_B64"].strip()

          # Remove cabeçalhos/rodapés caso o .b64 tenha sido gerado com certutil
          b64 = re.sub(r"-----BEGIN [^-]+-----", "", b64)
          b64 = re.sub(r"-----END [^-]+-----", "", b64)

          # Remove espaços e quebras de linha
          b64 = "".join(b64.split())

          data = base64.b64decode(b64)

          with open("credenciais.json", "wb") as f:
              f.write(data)
          PY

      - name: Validar credenciais.json
        run: |
          python -m json.tool credenciais.json > /dev/null
          echo "credenciais.json validado com sucesso"

      - name: Executar orcamento_atividades.py
        run: |
          python orcamento_atividades.py
